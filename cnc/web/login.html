<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VisionC2 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Segoe UI',system-ui,sans-serif}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:40px;width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.4);text-align:center}
h1{color:#a371f7;font-size:20px;margin-bottom:24px;letter-spacing:3px}
input{width:100%;padding:12px 14px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:15px;font-family:monospace;outline:none;transition:border-color .2s;margin-bottom:12px}
input:focus{border-color:#a371f7}
input::placeholder{color:#484f58}
button{width:100%;padding:12px;background:#a371f7;border:none;border-radius:6px;color:#fff;font-size:15px;cursor:pointer;transition:background .2s;font-weight:600;letter-spacing:1px}
button:hover{background:#8957e5}
.msg{margin-top:14px;font-size:13px;color:#484f58;min-height:20px}
.msg.err{color:#f85149}
.msg.ok{color:#3fb950}
</style>
</head>
<body>
<div class="card">
<h1>&#9790;&#8483;&#9790;</h1>
<div id="mode-user">
<input type="text" id="user" placeholder="用户名" autocomplete="off" spellcheck="false">
<input type="password" id="pass" placeholder="密码" autocomplete="off" spellcheck="false">
<button id="btn" type="button">登录</button>
</div>
<div id="mode-api" style="display:none">
<input type="password" id="apikey" placeholder="API 密钥" autocomplete="off" spellcheck="false">
<button id="btn-api" type="button">登录</button>
</div>
<div class="msg" id="msg"></div>
<div style="margin-top:16px"><a href="#" id="toggle" style="color:#484f58;font-size:12px;text-decoration:none">使用 API 密钥</a></div>
</div>
<script>
(function(){
  var user=document.getElementById('user');
  var pass=document.getElementById('pass');
  var apikey=document.getElementById('apikey');
  var msg=document.getElementById('msg');
  var btn=document.getElementById('btn');
  var btnApi=document.getElementById('btn-api');
  var toggle=document.getElementById('toggle');
  var modeUser=document.getElementById('mode-user');
  var modeApi=document.getElementById('mode-api');
  var isApiMode=false;

  toggle.addEventListener('click',function(e){
    e.preventDefault();
    isApiMode=!isApiMode;
    modeUser.style.display=isApiMode?'none':'';
    modeApi.style.display=isApiMode?'':'none';
    toggle.textContent=isApiMode?'使用用户名/密码':'使用 API 密钥';
    msg.textContent='';msg.className='msg';
    if(isApiMode){apikey.focus()}else{user.focus()}
  });

  function onSuccess(){
    msg.textContent='访问已授权';msg.className='msg ok';
    setTimeout(function(){window.location='/'},500);
  }
  function onError(text){
    msg.textContent=text||'拒绝访问';msg.className='msg err';
  }

  function doLogin(){
    var u=user.value.trim(),p=pass.value.trim();
    if(!u||!p)return;
    msg.textContent='';msg.className='msg';
    fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})})
    .then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d}})})
    .then(function(res){
      if(res.data.success){onSuccess()}else{onError(res.data.error);pass.value=''}
    })
    .catch(function(){onError('请求错误')});
  }

  function doApiLogin(){
    var k=apikey.value.trim();
    if(!k)return;
    msg.textContent='';msg.className='msg';
    fetch('/api/auth/apikey',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({api_key:k})})
    .then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d}})})
    .then(function(res){
      if(res.data.success){onSuccess()}else{onError(res.data.error);apikey.value=''}
    })
    .catch(function(){onError('请求错误')});
  }

  btn.addEventListener('click',doLogin);
  btnApi.addEventListener('click',doApiLogin);
  pass.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
  user.addEventListener('keydown',function(e){if(e.key==='Enter')pass.focus()});
  apikey.addEventListener('keydown',function(e){if(e.key==='Enter')doApiLogin()});
  setTimeout(function(){user.focus()},100);
})();
</script>
</body>
</html>
